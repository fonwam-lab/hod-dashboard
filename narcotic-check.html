<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>บันทึกการใช้ยาเสพติด | หอผู้ป่วยหญิง โรงพยาบาลฮอด</title>
<style>
:root{
  --blue:#1E7D4A; --blue-light:#E8F7EE; --white:#FFFFFF;
  --green:#28A745; --yellow:#FFC107; --red:#DC3545;
  --blue-grad-a:#2E9E5B; --blue-grad-b:#66BB6A;
  --text:#1D2939; --muted:#6B7A90;
  --shadow: 0 8px 24px rgba(15,76,129,0.12);
}
*{box-sizing:border-box;}
body{
  margin:0; font-family:'Segoe UI','Noto Sans Thai',sans-serif;
  background:linear-gradient(180deg,var(--blue-light) 0%, #F6FBFF 40%, #FFFFFF 100%);
  color:var(--text); min-height:100vh; padding-bottom:40px;
}
a.back{ display:inline-flex; align-items:center; gap:6px; color:#fff; text-decoration:none; font-size:13px; opacity:.9; position:relative; z-index:2; }
header{
  background:linear-gradient(120deg,var(--blue-grad-a) 0%, var(--blue-grad-b) 60%, #A5D6A7 100%);
  color:#fff; padding:18px 20px 34px; text-align:center; position:relative; overflow:hidden;
  border-radius:0 0 32px 32px; box-shadow:0 6px 20px rgba(15,76,129,0.25);
}
header::before, header::after{ content:""; position:absolute; border-radius:50%; background:rgba(255,255,255,0.08); }
header::before{ width:200px; height:200px; top:-80px; left:-60px; }
header::after{ width:150px; height:150px; bottom:-70px; right:-30px; }
.topbar{ display:flex; justify-content:space-between; align-items:center; position:relative; z-index:2; }
header h1{ font-size:19px; margin:14px 0 2px; position:relative; z-index:2; }
header p{ margin:0; font-size:12.5px; opacity:.9; position:relative; z-index:2; }
main{ max-width:680px; margin:0 auto; padding:0 16px; }
.card{
  background:var(--white); border-radius:20px; box-shadow:var(--shadow);
  padding:18px 18px; margin-top:-22px; position:relative; z-index:3; border:1px solid #EDF3F9;
}
.card + .card{ margin-top:16px; }
.section-title{ font-size:14px; font-weight:700; color:var(--blue); margin:0 0 10px; display:flex; justify-content:space-between; align-items:center; }
label{ display:block; font-size:12.5px; color:var(--muted); margin:12px 0 5px; }
input[type=date], input[type=time], input[type=text], input[type=number], select, textarea{
  width:100%; padding:10px 12px; border-radius:12px; border:1px solid #DCE7F0;
  font-size:14px; font-family:inherit; background:#FBFDFF;
}
textarea{ resize:vertical; min-height:60px; }
.shift-row{ display:flex; gap:8px; }
.shift-row label.opt{ flex:1; text-align:center; margin:0; padding:9px 0; border-radius:12px; border:1px solid #DCE7F0; cursor:pointer; font-size:13px; color:var(--text); background:#FBFDFF; }
.shift-row input{ display:none; }
.shift-row input:checked + label.opt{ background:var(--blue); color:#fff; border-color:var(--blue); }
details{ margin-top:4px; border:1px solid #EDF3F9; border-radius:14px; padding:2px 12px; margin-bottom:10px; }
summary{ cursor:pointer; font-weight:700; color:var(--blue); font-size:13.5px; padding:10px 0; list-style:none; display:flex; justify-content:space-between; align-items:center; }
summary::-webkit-details-marker{ display:none; }
summary .arrow::before{ content:"▸"; }
details[open] summary .arrow::before{ content:"▾"; }
.cat-badge{ font-size:11px; color:var(--muted); font-weight:400; }
.item-row{ padding:12px 2px; border-bottom:1px solid #F0F4F8; }
.item-row:last-child{ border-bottom:none; }
.item-top{ display:flex; justify-content:space-between; align-items:center; gap:10px; }
.item-name{ font-size:13.5px; flex:1; }
.item-name small{ display:block; color:var(--muted); font-size:11px; margin-top:2px; }
.item-controls{ display:flex; align-items:center; gap:8px; }
.item-controls input[type=number]{ width:64px; padding:7px 8px; text-align:center; }
.status-pill{ font-size:11px; font-weight:700; padding:4px 10px; border-radius:999px; white-space:nowrap; min-width:52px; text-align:center; }
.status-pill.ok{ background:#E7F7EC; color:var(--green); }
.status-pill.bad{ background:#FDEBED; color:var(--red); }
.extra-fields{ display:none; margin-top:8px; padding:10px; background:#FBF4F5; border-radius:10px; }
.extra-fields.show{ display:block; }
.extra-fields label{ margin:4px 0 3px; }
.extra-fields .row{ display:flex; gap:8px; }
.summary-bar{ display:flex; justify-content:space-around; text-align:center; margin-top:14px; padding-top:14px; border-top:1px dashed #E4EBF2; }
.summary-bar div .n{ font-size:19px; font-weight:700; color:var(--blue); }
.summary-bar div.ok .n{ color:var(--green); }
.summary-bar div.bad .n{ color:var(--red); }
.summary-bar div .l{ font-size:11px; color:var(--muted); }
.submit-btn{ width:100%; margin-top:18px; padding:13px; border:none; border-radius:14px; background:linear-gradient(120deg,var(--blue-grad-a),var(--blue-grad-b)); color:#fff; font-size:15px; font-weight:700; cursor:pointer; }
.submit-btn:disabled{ opacity:.6; cursor:not-allowed; }
.toast{ position:fixed; left:50%; bottom:24px; transform:translateX(-50%) translateY(20px); background:var(--text); color:#fff; padding:10px 18px; border-radius:999px; font-size:13px; opacity:0; transition:all .25s ease; pointer-events:none; z-index:50; }
.toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
.toast.err{ background:var(--red); }
table{ width:100%; border-collapse:collapse; font-size:12.5px; }
th, td{ text-align:left; padding:8px 6px; border-bottom:1px solid #F0F4F8; }
th{ color:var(--muted); font-weight:600; font-size:11.5px; }
.st-pass{ color:var(--green); font-weight:700; }
.st-fail{ color:var(--red); font-weight:700; }
.empty-row{ text-align:center; color:var(--muted); padding:16px 0; }
</style>
</head>
<body>

<header>
  <div class="topbar">
    <a class="back" href="index.html">← หน้าแรก</a>
    <span></span>
  </div>
  <h1>บันทึกการใช้ยาเสพติด</h1>
  <p>หอผู้ป่วยหญิง โรงพยาบาลฮอด</p>
</header>

<main>

  <div class="card">
    <p class="section-title">บันทึกการตรวจ</p>
    <label>วันที่ตรวจ</label>
    <input type="date" id="fDate">
    <label>เวลาตรวจ</label>
    <input type="time" id="fTime">
    <label>เวรที่ตรวจ</label>
    <div class="shift-row">
      <input type="radio" name="shift" id="shiftN" value="เช้า (N)"><label class="opt" for="shiftN">เช้า</label>
      <input type="radio" name="shift" id="shiftD" value="บ่าย (D)"><label class="opt" for="shiftD">บ่าย</label>
      <input type="radio" name="shift" id="shiftE" value="ดึก (E)"><label class="opt" for="shiftE">ดึก</label>
    </div>
    <label>ชื่อผู้ตรวจ</label>
    <input type="text" id="fInspector" placeholder="ชื่อ-นามสกุล">
  </div>

  <div class="card">
    <p class="section-title">รายการตรวจนับ (3 รายการ)</p>
    <div id="itemsWrap">
      <div class="item-row" data-name="Morphine inj 10mg/ml" data-std="5">
        <div class="item-top">
          <div class="item-name">Morphine inj 10mg/ml<small>มาตรฐาน 5</small></div>
          <div class="item-controls">
            <input type="number" class="curQty" min="0" placeholder="5">
            <span class="status-pill">–</span>
          </div>
        </div>
        <div class="extra-fields">
        <div class="row">
          <div style="flex:1">
            <label style="margin-top:0">จำนวนที่ใช้</label>
            <input type="text" class="usedQty" readonly>
          </div>
          <div style="flex:1">
            <label style="margin-top:0">ชื่อผู้ป่วยที่ใช้</label>
            <input type="text" class="patientName" placeholder="ชื่อ-สกุลผู้ป่วย">
          </div>
        </div></div>
      </div>
      <div class="item-row" data-name="Pethidine inj 50 mg/ml" data-std="2">
        <div class="item-top">
          <div class="item-name">Pethidine inj 50 mg/ml<small>มาตรฐาน 2</small></div>
          <div class="item-controls">
            <input type="number" class="curQty" min="0" placeholder="2">
            <span class="status-pill">–</span>
          </div>
        </div>
        <div class="extra-fields">
        <div class="row">
          <div style="flex:1">
            <label style="margin-top:0">จำนวนที่ใช้</label>
            <input type="text" class="usedQty" readonly>
          </div>
          <div style="flex:1">
            <label style="margin-top:0">ชื่อผู้ป่วยที่ใช้</label>
            <input type="text" class="patientName" placeholder="ชื่อ-สกุลผู้ป่วย">
          </div>
        </div></div>
      </div>
      <div class="item-row" data-name="Midazolam inj 5mg/ml" data-std="1">
        <div class="item-top">
          <div class="item-name">Midazolam inj 5mg/ml<small>มาตรฐาน 1</small></div>
          <div class="item-controls">
            <input type="number" class="curQty" min="0" placeholder="1">
            <span class="status-pill">–</span>
          </div>
        </div>
        <div class="extra-fields">
        <div class="row">
          <div style="flex:1">
            <label style="margin-top:0">จำนวนที่ใช้</label>
            <input type="text" class="usedQty" readonly>
          </div>
          <div style="flex:1">
            <label style="margin-top:0">ชื่อผู้ป่วยที่ใช้</label>
            <input type="text" class="patientName" placeholder="ชื่อ-สกุลผู้ป่วย">
          </div>
        </div></div>
      </div>
    </div>
    <div class="summary-bar">
      <div><div class="n" id="sumTotal">3</div><div class="l">ทั้งหมด</div></div>
      <div class="ok"><div class="n" id="sumOk">0</div><div class="l">ครบ</div></div>
      <div class="bad"><div class="n" id="sumBad">0</div><div class="l">ไม่ครบ</div></div>
    </div>
    <button class="submit-btn" id="submitBtn">บันทึกผลการตรวจนับ</button>
  </div>

  <div class="card">
    <p class="section-title">ประวัติการตรวจนับ / คืนสต๊อก</p>
    <table>
      <thead><tr><th>วันที่</th><th>เวร</th><th>ผู้ตรวจ</th><th>สถานะรวม</th></tr></thead>
      <tbody id="historyBody"><tr><td colspan="4" class="empty-row">กำลังโหลด...</td></tr></tbody>
    </table>
  </div>

</main>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   CONFIG
   ============================================================ */
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxrwXc_d7r4eWeABLUsuNpDYMc-f-7yjFOUwuPoDClZrnp8SJfHtNwOgYCFWdWX2ZsSPQ/exec";
const SYSTEM_KEY = "narcotic";
const HAS_PATIENT = true;

const now = new Date();
document.getElementById("fDate").value = now.toISOString().slice(0,10);
document.getElementById("fTime").value = now.toTimeString().slice(0,5);

function updateRow(row){
  const std = parseFloat(row.dataset.std);
  const curInput = row.querySelector(".curQty");
  const pill = row.querySelector(".status-pill");
  const extra = row.querySelector(".extra-fields");
  const usedQty = row.querySelector(".usedQty");
  const cur = curInput.value === "" ? null : parseFloat(curInput.value);

  if(cur === null){
    pill.textContent = "–"; pill.className = "status-pill";
    extra.classList.remove("show");
    return;
  }
  if(cur >= std){
    pill.textContent = "ครบ"; pill.className = "status-pill ok";
    extra.classList.remove("show");
  } else {
    pill.textContent = "ไม่ครบ"; pill.className = "status-pill bad";
    extra.classList.add("show");
    if(usedQty) usedQty.value = (std - cur).toString();
  }
  updateSummary();
}

function updateSummary(){
  const rows = document.querySelectorAll(".item-row");
  let ok=0, bad=0;
  rows.forEach(r=>{
    const pill = r.querySelector(".status-pill");
    if(pill.classList.contains("ok")) ok++;
    else if(pill.classList.contains("bad")) bad++;
  });
  document.getElementById("sumOk").textContent = ok;
  document.getElementById("sumBad").textContent = bad;
}

document.querySelectorAll(".item-row .curQty").forEach(inp=>{
  inp.addEventListener("input", ()=> updateRow(inp.closest(".item-row")));
});

function showToast(msg, isErr){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast show" + (isErr ? " err" : "");
  setTimeout(()=> t.classList.remove("show"), 2600);
}

document.getElementById("submitBtn").addEventListener("click", async ()=>{
  const shiftEl = document.querySelector('input[name="shift"]:checked');
  const inspector = document.getElementById("fInspector").value.trim();
  if(!shiftEl){ showToast("กรุณาเลือกเวรที่ตรวจ", true); return; }
  if(!inspector){ showToast("กรุณาระบุชื่อผู้ตรวจ", true); return; }

  const rows = document.querySelectorAll(".item-row");
  let missing = false;
  const items = [];
  let allOk = true;
  rows.forEach(r=>{
    const cur = r.querySelector(".curQty").value;
    if(cur === "") missing = true;
    const pill = r.querySelector(".status-pill");
    const isOk = pill.classList.contains("ok");
    if(!isOk) allOk = false;
    const entry = {
      name: r.dataset.name,
      std: r.dataset.std,
      current: cur,
      status: isOk ? "ครบ" : "ไม่ครบ"
    };
    if(!isOk){
      entry.shortage = r.querySelector(".usedQty") ? r.querySelector(".usedQty").value : "";
      if(HAS_PATIENT){
        entry.patient = r.querySelector(".patientName") ? r.querySelector(".patientName").value.trim() : "";
      }
    }
    items.push(entry);
  });
  if(missing){ showToast("กรุณากรอกจำนวนปัจจุบันให้ครบทุกรายการ", true); return; }

  const payload = {
    system: SYSTEM_KEY,
    date: document.getElementById("fDate").value,
    time: document.getElementById("fTime").value,
    shift: shiftEl.value,
    inspector,
    overallStatus: allOk ? "ครบ" : "ไม่ครบ",
    items
  };

  const btn = document.getElementById("submitBtn");
  btn.disabled = true; btn.textContent = "กำลังบันทึก...";
  try{
    await fetch(SCRIPT_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(payload)
    });
    showToast("บันทึกผลการตรวจนับเรียบร้อย ✅");
    loadHistory();
  }catch(e){
    showToast("บันทึกไม่สำเร็จ ตรวจสอบการเชื่อมต่อ", true);
  }finally{
    btn.disabled = false; btn.textContent = "บันทึกผลการตรวจนับ";
  }
});

async function loadHistory(){
  const body = document.getElementById("historyBody");
  if(!SCRIPT_URL){ body.innerHTML = '<tr><td colspan="4" class="empty-row">ยังไม่ได้เชื่อมต่อ API</td></tr>'; return; }
  try{
    const res = await fetch(`${SCRIPT_URL}?system=${SYSTEM_KEY}&mode=history`);
    const rows = await res.json();
    if(!Array.isArray(rows) || rows.length === 0){
      body.innerHTML = '<tr><td colspan="4" class="empty-row">ยังไม่มีข้อมูลการตรวจ</td></tr>';
      return;
    }
    body.innerHTML = rows.slice(0,10).map(r => `
      <tr>
        <td>${r.date || "-"}</td>
        <td>${r.shift || "-"}</td>
        <td>${r.inspector || "-"}</td>
        <td class="${r.overallStatus === 'ครบ' ? 'st-pass' : 'st-fail'}">${r.overallStatus || "-"}</td>
      </tr>`).join("");
  }catch(e){
    body.innerHTML = '<tr><td colspan="4" class="empty-row">โหลดประวัติไม่สำเร็จ</td></tr>';
  }
}
loadHistory();
</script>
</body>
</html>
